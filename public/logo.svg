<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente Principal Violeta a Azul -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    
    <!-- Gradiente Secundario Purpura a Cian -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Filtro de Sombra Suave -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Órbita 1 (Superior izquierda) -->
    <path d="M 25,25 A 38 38 0 0 1 75,25" fill="none" stroke="url(#glow-grad)" stroke-width="5" stroke-linecap="round" opacity="0.8" />
    
    <!-- Órbita 2 (Inferior derecha) -->
    <path d="M 75,75 A 38 38 0 0 1 25,75" fill="none" stroke="url(#glow-grad)" stroke-width="5" stroke-linecap="round" opacity="0.8" />
    
    <!-- Destello Nova Central -->
    <path d="M 50,15 Q 50,50 15,50 Q 50,50 50,85 Q 50,50 85,50 Q 50,50 50,15 Z" fill="url(#primary-grad)" />
    
    <!-- Destello Interior de Brillo (Blanco) -->
    <path d="M 50,32 Q 50,50 32,50 Q 50,50 50,68 Q 50,50 68,50 Q 50,50 50,32 Z" fill="#ffffff" opacity="0.9" />
  </g>
</svg>
